<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASL LinkedIn Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .banner-wrap {
    width: 1584px;
    height: 396px;
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
  }
  svg { display: block; }
  .asl-title {
    font-family: 'Crimson Text', Georgia, serif;
    font-weight: 600;
  }
  .asl-sub {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
  }
</style>
</head>
<body>
<div class="banner-wrap">

<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1A4F8A"/>
    <stop offset="32%" stop-color="#3278B8"/>
    <stop offset="68%" stop-color="#62AED4"/>
    <stop offset="100%" stop-color="#9ACDB8"/>
  </linearGradient>
  <linearGradient id="mtn1g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#5070A0"/>
    <stop offset="100%" stop-color="#384E68"/>
  </linearGradient>
  <linearGradient id="mtn2g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#688058"/>
    <stop offset="100%" stop-color="#486038"/>
  </linearGradient>
  <linearGradient id="hill1g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#5A9838"/>
    <stop offset="100%" stop-color="#3A7020"/>
  </linearGradient>
  <linearGradient id="hill2g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#68A840"/>
    <stop offset="100%" stop-color="#487828"/>
  </linearGradient>
  <linearGradient id="fgg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#60A038"/>
    <stop offset="100%" stop-color="#3E6820"/>
  </linearGradient>
  <linearGradient id="riverg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#4080B0" stop-opacity="0.6"/>
    <stop offset="50%" stop-color="#68A8CC" stop-opacity="0.80"/>
    <stop offset="100%" stop-color="#4080B0" stop-opacity="0.6"/>
  </linearGradient>
  <filter id="sfblur"><feGaussianBlur stdDeviation="1.4"/></filter>
  <filter id="mblur"><feGaussianBlur stdDeviation="2.8"/></filter>
  <filter id="glow"><feGaussianBlur stdDeviation="5"/></filter>
</defs>

<!-- SKY -->
<rect width="1584" height="396" fill="url(#sky)"/>
